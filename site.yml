---
- name: Configure Python VM
  hosts: localhost
  connection: local
  become: true
  pre_tasks:
    - name: Gather facts
      setup:

    - name: Determine Ubuntu major version
      set_fact:
        ubuntu_major_version: "{{ ansible_distribution_major_version | default('0') | int }}"

    - name: Set defaults based on Ubuntu version
      set_fact:
        default_desktop_env: "{{ 'gnome' if (ubuntu_major_version | int) <= 24 else 'xfce' }}"
        ubuntu_24_or_older: "{{ (ubuntu_major_version | int) <= 24 }}"

    - name: Ensure `favorite_desktop_env` uses default when not provided
      set_fact:
        favorite_desktop_env: "{{ favorite_desktop_env | default(default_desktop_env) }}"

  vars_prompt:
    - name: existing_user
      prompt: "Enter your existing username"
      private: no
      default: "student"
    - name: existing_user_pass
      prompt: "Enter your existing password"
      default: "Password01"

  vars_files:
    - group_vars/all.yml
  roles:
    - role: packages
      tags: packages
    # ---- Common (shared) roles ----
    - role: edgoad.common.hostname
      tags: hostname
    - role: edgoad.common.power_management
      tags: power_management
    - role: edgoad.common.boot
      tags: boot

    # Users must exist before user-scoped tools
    - role: users
      tags: users

    # Developer tooling
    - role: edgoad.common.vscode
      tags: vscode
    
    # Services
    - role: edgoad.common.xrdp
      tags: xrdp

    # ---- Lab-specific roles ----
    
    - role: edgoad.common.desktop_shortcuts
      tags: desktop_shortcuts
    - role: lab_ui
      tags: lab_ui
    
